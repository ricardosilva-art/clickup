<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indicadores Operacionais — Dattos Data Driven</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
  :root { --bg:#f8fafc; --card:#fff; --border:#e2e8f0; --t1:#0f172a; --t2:#475569; --t3:#94a3b8; --sqA:#2563eb; --sqB:#059669; --sqC:#7c3aed; --accent:#f59e0b; --danger:#ef4444; --success:#10b981; --r:10px; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',system-ui,sans-serif; background:var(--bg); color:var(--t1); padding:20px; min-height:100vh; }
  .container { max-width:900px; margin:0 auto; }
  h1 { font-size:20px; font-weight:700; letter-spacing:-0.03em; }
  .subtitle { font-size:13px; color:var(--t3); margin-top:3px; }
  .header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
  .hdr-actions { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .btn { border:1px solid var(--border); background:var(--card); color:var(--t2); border-radius:8px; padding:5px 12px; font-size:11.5px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .15s; }
  .btn:hover { border-color:#94a3b8; }
  .btn.act { background:#eff6ff; border-color:#93c5fd; color:var(--sqA); }
  .btn.act-a { background:#eff6ff; border-color:var(--sqA); color:var(--sqA); }
  .btn.act-b { background:#ecfdf5; border-color:var(--sqB); color:var(--sqB); }
  .btn.act-c { background:#f5f3ff; border-color:var(--sqC); color:var(--sqC); }
  .btn-p { background:var(--sqA); color:#fff; border-color:var(--sqA); padding:7px 18px; font-size:12.5px; }
  .btn-p:hover { background:#1d4ed8; }
  .kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; }
  @media(max-width:640px) { .kpi-grid { grid-template-columns:repeat(2,1fr); } }
  .kpi { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:14px 16px; border-top:3px solid var(--sqA); }
  .kpi.kb { border-top-color:var(--sqB); } .kpi.kc { border-top-color:var(--accent); } .kpi.kd { border-top-color:var(--sqC); }
  .kpi-label { font-size:10.5px; color:var(--t3); text-transform:uppercase; letter-spacing:.05em; font-weight:600; }
  .kpi-val { font-size:26px; font-weight:700; margin-top:4px; font-feature-settings:"tnum"; }
  .kpi-sub { font-size:10.5px; color:var(--t3); margin-top:2px; }
  .panel { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:18px; margin-bottom:20px; }
  .panel-title { font-size:14px; font-weight:700; margin-bottom:4px; display:flex; align-items:center; gap:8px; }
  .panel-sub { font-size:12px; color:var(--t3); margin-bottom:14px; }
  .tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:16px; }
  .tab { background:none; border:none; border-bottom:2px solid transparent; padding:8px 14px; font-size:12px; font-weight:600; color:var(--t3); cursor:pointer; font-family:inherit; }
  .tab.act { color:var(--t1); border-bottom-color:var(--sqA); }
  .tab-spacer { flex:1; }
  .bar-row { display:flex; align-items:center; gap:8px; padding:4px 0; }
  .bar-lbl { width:120px; font-size:11.5px; font-weight:500; color:var(--t2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex-shrink:0; }
  .bar-track { flex:1; background:#f1f5f9; border-radius:5px; height:24px; position:relative; overflow:hidden; }
  .bar-fill { height:100%; border-radius:5px; transition:width .5s cubic-bezier(.4,0,.2,1); }
  .fill-a { background:linear-gradient(90deg,#2563ebcc,#2563eb88); }
  .fill-b { background:linear-gradient(90deg,#059669cc,#05966988); }
  .fill-c { background:linear-gradient(90deg,#7c3aedcc,#7c3aed88); }
  .fill-warn { background:linear-gradient(90deg,#ef4444cc,#ef444488); }
  .fill-ok { background:linear-gradient(90deg,#10b981cc,#10b98188); }
  .bar-val { position:absolute; right:6px; top:4px; font-size:11px; font-weight:600; color:var(--t1); }
  .bar-cnt { width:40px; font-size:10.5px; color:var(--t3); text-align:right; flex-shrink:0; }
  .month-chart { display:flex; align-items:flex-end; gap:4px; height:140px; padding:8px 0; }
  .month-bar { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; min-width:0; }
  .month-bar-fill { width:100%; max-width:40px; border-radius:4px 4px 0 0; transition:height .4s; }
  .month-bar-val { font-size:10px; font-weight:600; margin-bottom:2px; }
  .month-bar-lbl { font-size:9.5px; color:var(--t3); margin-top:4px; font-weight:500; }
  .setup-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:40px; text-align:center; max-width:480px; margin:80px auto; }
  .setup-card h2 { font-size:17px; margin-bottom:8px; }
  .setup-card p { font-size:12.5px; color:var(--t2); margin-bottom:18px; line-height:1.5; }
  .setup-input { width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:8px; font-size:13px; font-family:monospace; margin-bottom:10px; outline:none; }
  .setup-input:focus { border-color:var(--sqA); box-shadow:0 0 0 3px rgba(37,99,235,.1); }
  .loading { text-align:center; padding:50px 20px; }
  .spinner { width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--sqA); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 12px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading p { font-size:12.5px; color:var(--t2); }
  .loading .prog { font-size:11px; color:var(--t3); margin-top:3px; }
  .footer { margin-top:14px; font-size:10.5px; color:var(--t3); line-height:1.5; }
  .error { background:#fef2f2; border:1px solid #fecaca; border-radius:8px; padding:14px; color:#991b1b; font-size:12.5px; margin:16px 0; }
  .section-sep { border-top:2px solid var(--border); margin:28px 0 20px; }
  .badge { display:inline-block; padding:1px 7px; border-radius:4px; font-size:9.5px; font-weight:600; }
  .badge-pos { background:#fef2f2; color:var(--danger); }
  .badge-neg { background:#ecfdf5; color:var(--success); }
  .detail-toggle { font-size:11.5px; color:var(--sqA); cursor:pointer; font-weight:600; border:none; background:none; font-family:inherit; }
  .detail-toggle:hover { text-decoration:underline; }
  table.dt { width:100%; border-collapse:collapse; margin-top:10px; font-size:11px; }
  table.dt th { text-align:left; padding:6px 8px; background:#f8fafc; border-bottom:1px solid var(--border); font-weight:600; color:var(--t2); }
  table.dt td { padding:5px 8px; border-bottom:1px solid #f1f5f9; color:var(--t2); }
  table.dt tr:hover td { background:#f8fafc; }
  .neg { color:var(--danger); font-weight:600; }
  .pos { color:var(--success); font-weight:600; }
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
const C = {
  teamId: "90133043858",
  folders: { "901317115532":"A", "901317119185":"B", "901317119243":"C" },
  fLeadTime: "8f1e3db7-8eb5-4dae-9b75-782b83c749f3",
  fDesvio: "664910a4-4e46-4947-83ba-e1156784c29e",
  api: "https://api.clickup.com/api/v2",
};
const MONTHS = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

let S = {
  token: localStorage.getItem("ck_token")||"",
  done:[], inprog:[], loading:false, error:null, progress:"",
  view1:"squad", view2:"squad", view3:"squad",
  filterSquad:null, showDetail1:false, showDetail2:false, showDetail3:false,
};

// Proxy CORS para funcionar em GitHub Pages / qualquer hosting
const PROXIES = [
  "https://corsproxy.io/?",
  "https://api.allorigins.win/raw?url="
];
let proxyIdx = 0;

async function api(path) {
  const fullUrl = C.api + path;
  for (let attempt = 0; attempt < PROXIES.length; attempt++) {
    const px = PROXIES[(proxyIdx + attempt) % PROXIES.length];
    const url = px + encodeURIComponent(fullUrl);
    try {
      const r = await fetch(url, { headers:{"Authorization":S.token,"Content-Type":"application/json"} });
      if (r.ok) {
        proxyIdx = (proxyIdx + attempt) % PROXIES.length; // remember working proxy
        return r.json();
      }
      if (r.status === 401 || r.status === 403) throw new Error(`Token inválido (${r.status}). Verifique seu API Token do ClickUp.`);
    } catch(e) {
      if (e.message.includes("Token inválido")) throw e;
      if (attempt === PROXIES.length - 1) throw new Error(`Falha de conexão. Tente novamente em alguns segundos.`);
    }
  }
}

async function fetchAllTasks(statusFilter) {
  const fIds = Object.keys(C.folders);
  let all = [];
  for (const fid of fIds) {
    let page = 0, more = true;
    while (more) {
      const sts = statusFilter.map(s => `statuses[]=${encodeURIComponent(s)}`).join("&");
      const data = await api(`/team/${C.teamId}/task?page=${page}&subtasks=true&include_closed=true&project_ids[]=${fid}&${sts}`);
      if (data.tasks && data.tasks.length > 0) { all.push(...data.tasks); page++; }
      else more = false;
      if (page > 15) more = false;
    }
  }
  return all;
}

async function getDetail(id) {
  try { return await api(`/task/${id}`); } catch { return null; }
}

function extractTask(basic, detail) {
  if (!detail) return null;
  let lt=null, dv=null;
  if (detail.custom_fields) {
    const ltf = detail.custom_fields.find(f=>f.id===C.fLeadTime);
    if (ltf && ltf.value!=null && ltf.value!=="") lt = parseFloat(ltf.value);
    const dvf = detail.custom_fields.find(f=>f.id===C.fDesvio);
    if (dvf && dvf.value!=null && dvf.value!=="") dv = parseFloat(dvf.value);
  }
  const fid = detail.folder?.id || basic.project?.id;
  const squad = C.folders[fid] || "?";
  const cliente = detail.list?.name || basic.list?.name || "?";
  const ass = detail.assignees||basic.assignees||[];
  const resp = ass.length>0 ? (ass[0].username||"?").split(" ").slice(0,2).join(" ") : "Sem resp.";
  const dateDone = detail.date_done ? new Date(parseInt(detail.date_done)) : null;
  const startDate = detail.start_date ? new Date(parseInt(detail.start_date)) : null;
  const daysInProgress = startDate ? Math.floor((Date.now()-startDate.getTime())/(86400000)) : null;
  return {
    id:basic.id, cid:basic.custom_id||detail.custom_id, name:basic.name||detail.name,
    squad, cliente, resp, lt, dv, dateDone, startDate, daysInProgress,
    status: detail.status?.status||"?"
  };
}

async function loadData() {
  S.loading=true; S.error=null; S.done=[]; S.inprog=[]; render();
  try {
    // 1. Concluídas
    S.progress="Buscando tarefas concluídas..."; render();
    const rawDone = await fetchAllTasks(["concluído"]);
    S.progress=`${rawDone.length} concluídas. Buscando em andamento...`; render();

    // 2. Em andamento
    const rawIP = await fetchAllTasks(["em andamento"]);
    S.progress=`${rawDone.length} concluídas + ${rawIP.length} em andamento. Buscando detalhes...`; render();

    const allRaw = [...rawDone.map(t=>({...t,_type:"done"})), ...rawIP.map(t=>({...t,_type:"ip"}))];

    // 3. Get details
    const batchSz = 5;
    const done=[], ip=[];
    for (let i=0; i<allRaw.length; i+=batchSz) {
      const batch = allRaw.slice(i, i+batchSz);
      S.progress=`Detalhes ${i+1}-${Math.min(i+batchSz,allRaw.length)} de ${allRaw.length}...`; render();
      const details = await Promise.all(batch.map(t=>getDetail(t.id)));
      for (let j=0; j<batch.length; j++) {
        const t = extractTask(batch[j], details[j]);
        if (!t) continue;
        if (batch[j]._type==="done") done.push(t);
        else ip.push(t);
      }
      if (i+batchSz<allRaw.length) await new Promise(r=>setTimeout(r,350));
    }
    S.done=done; S.inprog=ip; S.loading=false; render();
  } catch(e) { S.loading=false; S.error=e.message; render(); }
}

// ── Math ──
function avg(a) { const v=a.filter(x=>x!=null&&x>0); return v.length ? +(v.reduce((s,x)=>s+x,0)/v.length).toFixed(1) : 0; }
function med(a) { const v=a.filter(x=>x!=null&&x>0).sort((a,b)=>a-b); if(!v.length)return 0; const m=Math.floor(v.length/2); return v.length%2?v[m]:+((v[m-1]+v[m])/2).toFixed(1); }
function p90(a) { const v=a.filter(x=>x!=null&&x>0).sort((a,b)=>a-b); return v.length?v[Math.floor(v.length*.9)]:0; }
function grp(tasks,key) {
  const g={};
  tasks.forEach(t=>{ const k=t[key]||"?"; if(!g[k])g[k]={v:[],sq:new Set()}; g[k].v.push(t.lt); g[k].sq.add(t.squad); });
  return Object.entries(g).map(([n,d])=>({name:n,avg:avg(d.v),med:med(d.v),count:d.v.filter(x=>x!=null&&x>0).length,total:d.v.length,squad:[...d.sq][0]})).filter(g=>g.count>0).sort((a,b)=>b.avg-a.avg);
}
function grpDv(tasks,key) {
  const g={};
  tasks.forEach(t=>{ if(t.dv==null)return; const k=t[key]||"?"; if(!g[k])g[k]={v:[],sq:new Set()}; g[k].v.push(t.dv); g[k].sq.add(t.squad); });
  return Object.entries(g).map(([n,d])=>({name:n,avg:+(d.v.reduce((s,x)=>s+x,0)/d.v.length).toFixed(1),count:d.v.length,squad:[...d.sq][0]})).sort((a,b)=>b.avg-a.avg);
}
function grpIP(tasks,key) {
  const g={};
  tasks.forEach(t=>{ const k=t[key]||"?"; if(!g[k])g[k]={v:[],sq:new Set()}; g[k].v.push(t.lt||t.daysInProgress); g[k].sq.add(t.squad); });
  return Object.entries(g).map(([n,d])=>({name:n,avg:avg(d.v),count:d.v.filter(x=>x!=null&&x>0).length,squad:[...d.sq][0]})).filter(g=>g.count>0).sort((a,b)=>b.avg-a.avg);
}
function monthlyData(tasks) {
  const byMonth={};
  tasks.forEach(t=>{
    if(!t.dateDone||t.lt==null||t.lt<=0)return;
    const key=`${t.dateDone.getFullYear()}-${String(t.dateDone.getMonth()+1).padStart(2,'0')}`;
    if(!byMonth[key])byMonth[key]={vals:[],label:MONTHS[t.dateDone.getMonth()]+"/"+String(t.dateDone.getFullYear()).slice(2)};
    byMonth[key].vals.push(t.lt);
  });
  return Object.entries(byMonth).sort(([a],[b])=>a.localeCompare(b)).map(([k,d])=>({key:k,label:d.label,avg:avg(d.vals),count:d.vals.length}));
}

// ── Render helpers ──
function sqCls(s) { return s==="A"?"fill-a":s==="B"?"fill-b":"fill-c"; }
function barHTML(name,value,max,count,squad,suffix="d") {
  const pct=max>0?(value/max)*100:0;
  return `<div class="bar-row"><div class="bar-lbl" title="${name}">${name}</div><div class="bar-track"><div class="bar-fill ${sqCls(squad)}" style="width:${Math.min(pct,100)}%"></div><span class="bar-val">${value}${suffix}</span></div><div class="bar-cnt">${count}</div></div>`;
}
function dvBarHTML(name,value,max,count,squad) {
  const absMax=Math.max(Math.abs(max),1);
  const pct=Math.min(Math.abs(value)/absMax*100,100);
  const cls=value>0?"fill-warn":"fill-ok";
  return `<div class="bar-row"><div class="bar-lbl" title="${name}">${name}</div><div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div><span class="bar-val ${value>0?'neg':'pos'}">${value>0?"+":""}${value}d</span></div><div class="bar-cnt">${count}</div></div>`;
}

// ── Main render ──
function render() {
  const app=document.getElementById("app");

  if (!S.token) {
    app.innerHTML=`<div class="setup-card"><h2>🔑 Configurar API Token</h2><p>Insira seu API Token do ClickUp.<br>Acesse <strong>ClickUp → Settings → Apps → API Token</strong>.<br><span style="font-size:11px;color:var(--t3)">Conexão via proxy CORS seguro (corsproxy.io)</span></p><input class="setup-input" id="ti" type="password" placeholder="pk_xxxxxxxxxx..."/><br><button class="btn btn-p" onclick="saveToken()">Conectar</button></div>`;
    return;
  }
  if (S.loading) {
    app.innerHTML=`<div class="loading"><div class="spinner"></div><p>Carregando dados do ClickUp...</p><p class="prog">${S.progress}</p></div>`;
    return;
  }
  if (S.error) {
    app.innerHTML=`<div class="error"><strong>Erro:</strong> ${S.error}<br><br><button class="btn" onclick="S.token='';localStorage.removeItem('ck_token');render();">Reconfigurar</button> <button class="btn btn-p" onclick="loadData()">Tentar novamente</button></div>`;
    return;
  }
  if (S.done.length===0 && S.inprog.length===0) {
    app.innerHTML=`<div class="setup-card"><h2>📊 Indicadores Operacionais</h2><p>Token configurado. Clique para buscar dados das 3 squads.</p><button class="btn btn-p" onclick="loadData()">🔄 Carregar dados</button><br><br><button class="btn" onclick="S.token='';localStorage.removeItem('ck_token');render();" style="font-size:10px;">Trocar token</button></div>`;
    return;
  }

  const fd = S.filterSquad ? S.done.filter(t=>t.squad===S.filterSquad) : S.done;
  const fi = S.filterSquad ? S.inprog.filter(t=>t.squad===S.filterSquad) : S.inprog;
  const sqF = (s) => S.filterSquad===s ? `btn act-${s.toLowerCase()}` : "btn";

  // ═══ PANEL 1: Lead Time Concluídas ═══
  const valid1 = fd.filter(t=>t.lt!=null&&t.lt>0);
  const g1 = S.view1==="squad" ? grp(valid1,"squad").map(g=>({...g,name:`Squad ${g.name}`})) : S.view1==="cliente" ? grp(valid1,"cliente") : grp(valid1,"resp");
  const max1 = g1.length>0 ? Math.max(...g1.map(g=>g.avg)) : 1;
  const mData = monthlyData(fd);
  const maxMonth = mData.length>0 ? Math.max(...mData.map(m=>m.avg)) : 1;

  // ═══ PANEL 2: Em Andamento ═══
  const valid2 = fi.filter(t=>(t.lt!=null&&t.lt>0)||(t.daysInProgress!=null&&t.daysInProgress>0));
  const g2 = S.view2==="squad" ? grpIP(valid2,"squad").map(g=>({...g,name:`Squad ${g.name}`})) : S.view2==="cliente" ? grpIP(valid2,"cliente") : grpIP(valid2,"resp");
  const max2 = g2.length>0 ? Math.max(...g2.map(g=>g.avg)) : 1;

  // ═══ PANEL 3: Desvio ═══
  const valid3 = fd.filter(t=>t.dv!=null);
  const g3 = S.view3==="squad" ? grpDv(valid3,"squad").map(g=>({...g,name:`Squad ${g.name}`})) : S.view3==="cliente" ? grpDv(valid3,"cliente") : grpDv(valid3,"resp");
  const maxDv = g3.length>0 ? Math.max(...g3.map(g=>Math.abs(g.avg))) : 1;
  const avgDv = valid3.length>0 ? +(valid3.reduce((s,t)=>s+t.dv,0)/valid3.length).toFixed(1) : 0;
  const atrasadas = valid3.filter(t=>t.dv>0).length;
  const antecipadas = valid3.filter(t=>t.dv<0).length;

  app.innerHTML=`
  <!-- Header -->
  <div class="header">
    <div><h1>Indicadores Operacionais</h1><p class="subtitle">Dattos Data Driven · ${S.done.length} concluídas · ${S.inprog.length} em andamento</p></div>
    <div class="hdr-actions">
      <button class="${S.filterSquad===null?'btn act':'btn'}" onclick="sf(null)">Todas</button>
      <button class="${sqF('A')}" onclick="sf('A')">Squad A</button>
      <button class="${sqF('B')}" onclick="sf('B')">Squad B</button>
      <button class="${sqF('C')}" onclick="sf('C')">Squad C</button>
      <button class="btn" onclick="loadData()" title="Atualizar">🔄</button>
    </div>
  </div>

  <!-- ═══════════ PAINEL 1: LEAD TIME CONCLUÍDAS ═══════════ -->
  <div class="panel">
    <div class="panel-title">📊 Lead Time Médio (Tarefas Concluídas)</div>
    <div class="panel-sub">Tempo entre início e entrega oficial · apenas campo Lead Time (dias)</div>

    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Média geral</div><div class="kpi-val">${avg(valid1.map(t=>t.lt))}d</div><div class="kpi-sub">dias/entrega</div></div>
      <div class="kpi kb"><div class="kpi-label">Mediana</div><div class="kpi-val">${med(valid1.map(t=>t.lt))}d</div><div class="kpi-sub">valor central</div></div>
      <div class="kpi kc"><div class="kpi-label">P90</div><div class="kpi-val">${p90(valid1.map(t=>t.lt))}d</div><div class="kpi-sub">90% entregam até</div></div>
      <div class="kpi kd"><div class="kpi-label">Com dados</div><div class="kpi-val">${valid1.length}</div><div class="kpi-sub">de ${fd.length} concluídas</div></div>
    </div>

    <!-- Mês a mês -->
    <div style="font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px;">Lead Time médio por mês de conclusão</div>
    <div class="month-chart">
      ${mData.map(m=>`
        <div class="month-bar">
          <div class="month-bar-val">${m.avg}d</div>
          <div class="month-bar-fill fill-a" style="height:${maxMonth>0?Math.max(m.avg/maxMonth*100,4):4}%"></div>
          <div class="month-bar-lbl">${m.label}</div>
        </div>
      `).join("")}
      ${mData.length===0?'<div style="text-align:center;width:100%;color:var(--t3);padding:30px">Sem dados mensais</div>':''}
    </div>

    <!-- Grouped bars -->
    <div class="tabs">
      <button class="tab ${S.view1==='squad'?'act':''}" onclick="sv('view1','squad')">◼ Squad</button>
      <button class="tab ${S.view1==='cliente'?'act':''}" onclick="sv('view1','cliente')">◆ Cliente</button>
      <button class="tab ${S.view1==='resp'?'act':''}" onclick="sv('view1','resp')">● Responsável</button>
    </div>
    ${g1.slice(0,S.view1==='squad'?3:15).map(g=>barHTML(g.name,g.avg,max1,g.count,g.squad)).join("")}
    ${g1.length===0?'<div style="text-align:center;padding:20px;color:var(--t3)">Sem dados</div>':''}
  </div>

  <div class="section-sep"></div>

  <!-- ═══════════ PAINEL 2: EM ANDAMENTO ═══════════ -->
  <div class="panel">
    <div class="panel-title">⏱ Lead Time (Tarefas Em Andamento)</div>
    <div class="panel-sub">Dias corridos desde o início · ${fi.length} tarefas em andamento</div>

    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Média</div><div class="kpi-val">${avg(valid2.map(t=>t.lt||t.daysInProgress))}d</div><div class="kpi-sub">dias em andamento</div></div>
      <div class="kpi kb"><div class="kpi-label">Mediana</div><div class="kpi-val">${med(valid2.map(t=>t.lt||t.daysInProgress))}d</div><div class="kpi-sub">valor central</div></div>
      <div class="kpi kc"><div class="kpi-label">Máximo</div><div class="kpi-val">${valid2.length>0?Math.max(...valid2.map(t=>t.lt||t.daysInProgress||0)):0}d</div><div class="kpi-sub">tarefa mais antiga</div></div>
      <div class="kpi kd"><div class="kpi-label">Total</div><div class="kpi-val">${fi.length}</div><div class="kpi-sub">em andamento agora</div></div>
    </div>

    <div class="tabs">
      <button class="tab ${S.view2==='squad'?'act':''}" onclick="sv('view2','squad')">◼ Squad</button>
      <button class="tab ${S.view2==='cliente'?'act':''}" onclick="sv('view2','cliente')">◆ Cliente</button>
      <button class="tab ${S.view2==='resp'?'act':''}" onclick="sv('view2','resp')">● Responsável</button>
    </div>
    ${g2.slice(0,S.view2==='squad'?3:15).map(g=>barHTML(g.name,g.avg,max2,g.count,g.squad)).join("")}
    ${g2.length===0?'<div style="text-align:center;padding:20px;color:var(--t3)">Sem dados</div>':''}
  </div>

  <div class="section-sep"></div>

  <!-- ═══════════ PAINEL 3: DESVIO PREVISTO X REAL ═══════════ -->
  <div class="panel">
    <div class="panel-title">📐 Desvio Previsto x Real (Tarefas Concluídas)</div>
    <div class="panel-sub">Diferença entre Data Entrega Oficial e Término Planejado · positivo = atraso · negativo = antecipou</div>

    <div class="kpi-grid">
      <div class="kpi" style="border-top-color:${avgDv>0?'var(--danger)':'var(--success)'}"><div class="kpi-label">Desvio médio</div><div class="kpi-val ${avgDv>0?'neg':'pos'}">${avgDv>0?'+':''}${avgDv}d</div><div class="kpi-sub">${avgDv>0?'atraso médio':'antecipação média'}</div></div>
      <div class="kpi" style="border-top-color:var(--danger)"><div class="kpi-label">Atrasadas</div><div class="kpi-val neg">${atrasadas}</div><div class="kpi-sub">entregues depois do planejado</div></div>
      <div class="kpi" style="border-top-color:var(--success)"><div class="kpi-label">Antecipadas</div><div class="kpi-val pos">${antecipadas}</div><div class="kpi-sub">entregues antes do planejado</div></div>
      <div class="kpi kd"><div class="kpi-label">Com dados</div><div class="kpi-val">${valid3.length}</div><div class="kpi-sub">de ${fd.length} concluídas</div></div>
    </div>

    <div class="tabs">
      <button class="tab ${S.view3==='squad'?'act':''}" onclick="sv('view3','squad')">◼ Squad</button>
      <button class="tab ${S.view3==='cliente'?'act':''}" onclick="sv('view3','cliente')">◆ Cliente</button>
      <button class="tab ${S.view3==='resp'?'act':''}" onclick="sv('view3','resp')">● Responsável</button>
    </div>
    ${g3.slice(0,S.view3==='squad'?3:15).map(g=>dvBarHTML(g.name,g.avg,maxDv,g.count,g.squad)).join("")}
    ${g3.length===0?'<div style="text-align:center;padding:20px;color:var(--t3)">Sem dados</div>':''}
  </div>

  <div class="footer">
    Lead Time = DAYS(Data Entrega Oficial, start_date). Desvio = DAYS(Data Entrega Oficial, Término Plan.).
    Dados via API REST do ClickUp (proxy CORS) · Squads A/B/C · Filtro: apenas "concluído" (sem canceladas).
    <button class="btn" onclick="S.token='';localStorage.removeItem('ck_token');render();" style="font-size:9px;padding:2px 6px;margin-left:6px;">Desconectar</button>
  </div>`;
}

function saveToken() { const v=document.getElementById("ti").value.trim(); if(!v)return; S.token=v; localStorage.setItem("ck_token",v); render(); }
function sf(s) { S.filterSquad=s; render(); }
function sv(k,v) { S[k]=v; render(); }
render();
</script>
</body>
</html>
