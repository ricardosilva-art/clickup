<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Time Médio — Dattos Data Driven</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
    --text-1: #0f172a;
    --text-2: #475569;
    --text-3: #94a3b8;
    --squad-a: #2563eb;
    --squad-b: #059669;
    --squad-c: #7c3aed;
    --accent: #f59e0b;
    --danger: #ef4444;
    --radius: 10px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text-1);
    padding: 24px;
    min-height: 100vh;
  }

  .container { max-width: 880px; margin: 0 auto; }

  /* ── Header ── */
  .header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
  .header h1 { font-size:22px; font-weight:700; letter-spacing:-0.03em; }
  .header p { font-size:13px; color:var(--text-3); margin-top:4px; }
  .header-actions { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }

  /* ── Buttons ── */
  .btn {
    border:1px solid var(--border); background:var(--card); color:var(--text-2);
    border-radius:8px; padding:6px 14px; font-size:12px; font-weight:600;
    cursor:pointer; transition:all 0.15s; font-family:inherit;
  }
  .btn:hover { border-color:#94a3b8; color:var(--text-1); }
  .btn.active { background:#eff6ff; border-color:#93c5fd; color:var(--squad-a); }
  .btn.active-a { background:#eff6ff; border-color:var(--squad-a); color:var(--squad-a); }
  .btn.active-b { background:#ecfdf5; border-color:var(--squad-b); color:var(--squad-b); }
  .btn.active-c { background:#f5f3ff; border-color:var(--squad-c); color:var(--squad-c); }
  .btn-primary {
    background:var(--squad-a); color:#fff; border-color:var(--squad-a);
    padding:8px 20px; font-size:13px;
  }
  .btn-primary:hover { background:#1d4ed8; }

  /* ── KPI Grid ── */
  .kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }
  @media(max-width:640px) { .kpi-grid { grid-template-columns:repeat(2,1fr); } }
  .kpi {
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px 18px; border-top:3px solid var(--squad-a); position:relative;
  }
  .kpi.kpi-b { border-top-color:var(--squad-b); }
  .kpi.kpi-c { border-top-color:var(--accent); }
  .kpi.kpi-d { border-top-color:var(--squad-c); }
  .kpi-label { font-size:11px; color:var(--text-3); text-transform:uppercase; letter-spacing:0.05em; font-weight:600; }
  .kpi-value { font-size:28px; font-weight:700; margin-top:6px; font-feature-settings:"tnum"; }
  .kpi-sub { font-size:11px; color:var(--text-3); margin-top:2px; }

  /* ── Tabs ── */
  .tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:20px; }
  .tab {
    background:none; border:none; border-bottom:2px solid transparent;
    padding:10px 18px; font-size:13px; font-weight:600; color:var(--text-3);
    cursor:pointer; font-family:inherit; transition:all 0.15s;
  }
  .tab:hover { color:var(--text-2); }
  .tab.active { color:var(--text-1); border-bottom-color:var(--squad-a); }
  .tab-spacer { flex:1; }
  .tab-check { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-3); padding:0 8px; }
  .tab-check input { accent-color:var(--accent); }

  /* ── Chart Card ── */
  .chart-card {
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:20px;
  }
  .chart-title { font-size:13px; font-weight:600; color:var(--text-2); margin-bottom:14px; display:flex; justify-content:space-between; }

  /* ── Bars ── */
  .bar-row { display:flex; align-items:center; gap:10px; padding:5px 0; }
  .bar-label {
    width:140px; font-size:12.5px; font-weight:500; color:var(--text-2);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex-shrink:0;
  }
  .bar-track { flex:1; background:#f1f5f9; border-radius:6px; height:28px; position:relative; overflow:hidden; }
  .bar-fill { height:100%; border-radius:6px; transition:width 0.6s cubic-bezier(.4,0,.2,1); }
  .bar-fill.sq-a { background:linear-gradient(90deg, #2563ebdd, #2563eb99); }
  .bar-fill.sq-b { background:linear-gradient(90deg, #059669dd, #05966999); }
  .bar-fill.sq-c { background:linear-gradient(90deg, #7c3aeddd, #7c3aed99); }
  .bar-value { position:absolute; right:8px; top:5px; font-size:12px; font-weight:600; color:var(--text-1); }
  .bar-median { position:absolute; top:0; bottom:0; width:2px; background:var(--accent); opacity:0.7; }
  .bar-count { width:45px; font-size:11px; color:var(--text-3); text-align:right; flex-shrink:0; }

  /* ── Loading / Setup ── */
  .setup-card {
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:40px; text-align:center; max-width:500px; margin:80px auto;
  }
  .setup-card h2 { font-size:18px; margin-bottom:8px; }
  .setup-card p { font-size:13px; color:var(--text-2); margin-bottom:20px; line-height:1.6; }
  .setup-input {
    width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:8px;
    font-size:14px; font-family:monospace; margin-bottom:12px; outline:none;
  }
  .setup-input:focus { border-color:var(--squad-a); box-shadow:0 0 0 3px rgba(37,99,235,0.1); }

  .loading { text-align:center; padding:60px 20px; }
  .loading-spinner {
    width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--squad-a);
    border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading p { font-size:13px; color:var(--text-2); }
  .loading .progress { font-size:12px; color:var(--text-3); margin-top:4px; }

  .footer { margin-top:16px; font-size:11px; color:var(--text-3); line-height:1.5; }
  .error { background:#fef2f2; border:1px solid #fecaca; border-radius:8px; padding:16px; color:#991b1b; font-size:13px; margin:20px 0; }

  /* ── Detail table ── */
  .detail-toggle { font-size:12px; color:var(--squad-a); cursor:pointer; font-weight:600; border:none; background:none; font-family:inherit; }
  .detail-toggle:hover { text-decoration:underline; }
  .detail-table { width:100%; border-collapse:collapse; margin-top:12px; font-size:12px; }
  .detail-table th { text-align:left; padding:8px 10px; background:#f8fafc; border-bottom:1px solid var(--border); font-weight:600; color:var(--text-2); }
  .detail-table td { padding:7px 10px; border-bottom:1px solid #f1f5f9; color:var(--text-2); }
  .detail-table tr:hover td { background:#f8fafc; }
  .badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:10px; font-weight:600; }
  .badge-a { background:#eff6ff; color:var(--squad-a); }
  .badge-b { background:#ecfdf5; color:var(--squad-b); }
  .badge-c { background:#f5f3ff; color:var(--squad-c); }
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
// ══════════════════════════════════════════════════════════
// CONFIG — IDs do workspace Dattos
// ══════════════════════════════════════════════════════════
const CONFIG = {
  teamId: "90133043858",
  folders: {
    "901317115532": "A",  // Squad A
    "901317119185": "B",  // Squad B
    "901317119243": "C",  // Squad C
  },
  fieldLeadTime: "8f1e3db7-8eb5-4dae-9b75-782b83c749f3",
  fieldDesvio: "664910a4-4e46-4947-83ba-e1156784c29e",
  apiBase: "https://api.clickup.com/api/v2",
};

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let STATE = {
  token: localStorage.getItem("ck_token") || "",
  tasks: [],
  loading: false,
  error: null,
  progress: "",
  view: "squad",       // squad | cliente | resp
  filterSquad: null,    // null | A | B | C
  showMedian: false,
  showDetail: false,
};

// ══════════════════════════════════════════════════════════
// API HELPERS
// ══════════════════════════════════════════════════════════
async function apiFetch(path) {
  const r = await fetch(CONFIG.apiBase + path, {
    headers: { "Authorization": STATE.token, "Content-Type": "application/json" }
  });
  if (!r.ok) throw new Error(`API ${r.status}: ${r.statusText}`);
  return r.json();
}

async function fetchAllClosedTasks() {
  const folderIds = Object.keys(CONFIG.folders);
  let allTasks = [];
  let page = 0;
  let hasMore = true;

  while (hasMore) {
    STATE.progress = `Buscando página ${page}...`;
    render();

    // Use team tasks endpoint with filters
    const params = new URLSearchParams({
      page: page.toString(),
      subtasks: "true",
      include_closed: "true",
      statuses: ["concluído", "cancelado"].join(","),
      // We'll filter by folder after
    });

    // Fetch from each folder
    let pageTasks = [];
    for (const folderId of folderIds) {
      try {
        const data = await apiFetch(`/team/${CONFIG.teamId}/task?page=${page}&subtasks=true&include_closed=true&project_ids[]=${folderId}&statuses[]=conclu%C3%ADdo&statuses[]=cancelado`);
        if (data.tasks) pageTasks.push(...data.tasks);
      } catch (e) {
        console.warn(`Folder ${folderId} page ${page}:`, e.message);
      }
    }

    if (pageTasks.length === 0) {
      hasMore = false;
    } else {
      allTasks.push(...pageTasks);
      page++;
      if (page > 10) hasMore = false; // safety
    }
  }

  return allTasks;
}

async function fetchTaskDetail(taskId) {
  try {
    const data = await apiFetch(`/task/${taskId}`);
    return data;
  } catch (e) {
    console.warn(`Task ${taskId}:`, e.message);
    return null;
  }
}

async function loadData() {
  STATE.loading = true;
  STATE.error = null;
  STATE.tasks = [];
  render();

  try {
    // Step 1: Get all closed tasks (basic info)
    STATE.progress = "Buscando tarefas concluídas...";
    render();

    const rawTasks = await fetchAllClosedTasks();
    STATE.progress = `${rawTasks.length} tarefas encontradas. Buscando detalhes...`;
    render();

    // Step 2: Get detailed info for each task (Lead Time field)
    const processed = [];
    const batchSize = 5; // concurrent requests
    for (let i = 0; i < rawTasks.length; i += batchSize) {
      const batch = rawTasks.slice(i, i + batchSize);
      STATE.progress = `Processando ${i + 1}-${Math.min(i + batchSize, rawTasks.length)} de ${rawTasks.length}...`;
      render();

      const details = await Promise.all(batch.map(t => fetchTaskDetail(t.id)));

      for (let j = 0; j < batch.length; j++) {
        const basic = batch[j];
        const detail = details[j];
        if (!detail) continue;

        // Extract Lead Time from custom fields
        let leadTime = null;
        let desvio = null;
        if (detail.custom_fields) {
          const ltField = detail.custom_fields.find(f => f.id === CONFIG.fieldLeadTime);
          if (ltField && ltField.value != null && ltField.value !== "") {
            leadTime = parseFloat(ltField.value);
          }
          const dvField = detail.custom_fields.find(f => f.id === CONFIG.fieldDesvio);
          if (dvField && dvField.value != null && dvField.value !== "") {
            desvio = parseFloat(dvField.value);
          }
        }

        // Determine squad from folder
        const folderId = detail.folder?.id || basic.project?.id;
        const squad = CONFIG.folders[folderId] || "?";

        // Client = list name
        const cliente = detail.list?.name || basic.list?.name || "Sem lista";

        // Assignee
        const assignees = detail.assignees || basic.assignees || [];
        const resp = assignees.length > 0 ? assignees[0].username || "Sem nome" : "Sem responsável";

        processed.push({
          id: basic.id,
          customId: basic.custom_id || detail.custom_id,
          name: basic.name || detail.name,
          squad,
          cliente,
          resp: resp.split(" ").slice(0, 2).join(" "), // First 2 words
          lt: leadTime,
          desvio,
          status: detail.status?.status || "?"
        });
      }

      // Rate limit: small delay between batches
      if (i + batchSize < rawTasks.length) {
        await new Promise(r => setTimeout(r, 200));
      }
    }

    STATE.tasks = processed;
    STATE.loading = false;
    STATE.progress = "";
    render();

  } catch (e) {
    STATE.loading = false;
    STATE.error = e.message;
    render();
  }
}

// ══════════════════════════════════════════════════════════
// MATH HELPERS
// ══════════════════════════════════════════════════════════
function avg(arr) {
  const v = arr.filter(x => x != null && x > 0);
  return v.length ? +(v.reduce((a, b) => a + b, 0) / v.length).toFixed(1) : 0;
}
function med(arr) {
  const v = arr.filter(x => x != null && x > 0).sort((a, b) => a - b);
  if (!v.length) return 0;
  const m = Math.floor(v.length / 2);
  return v.length % 2 ? v[m] : +((v[m - 1] + v[m]) / 2).toFixed(1);
}
function p90(arr) {
  const v = arr.filter(x => x != null && x > 0).sort((a, b) => a - b);
  return v.length ? v[Math.floor(v.length * 0.9)] : 0;
}
function groupBy(tasks, key) {
  const g = {};
  tasks.forEach(t => {
    const k = t[key] || "Sem info";
    if (!g[k]) g[k] = { vals: [], squads: new Set() };
    g[k].vals.push(t.lt);
    g[k].squads.add(t.squad);
  });
  return Object.entries(g)
    .map(([name, d]) => ({
      name,
      avg: avg(d.vals),
      med: med(d.vals),
      count: d.vals.filter(v => v != null && v > 0).length,
      total: d.vals.length,
      squad: [...d.squads][0]
    }))
    .filter(g => g.count > 0)
    .sort((a, b) => b.avg - a.avg);
}

// ══════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════
function render() {
  const app = document.getElementById("app");

  // ── Setup screen ──
  if (!STATE.token) {
    app.innerHTML = `
      <div class="setup-card">
        <h2>🔑 Configurar API Token</h2>
        <p>Para conectar ao ClickUp, insira seu API Token pessoal.<br>
        Acesse <strong>ClickUp → Settings → Apps → API Token</strong> para copiar.</p>
        <input class="setup-input" id="tokenInput" type="password" placeholder="pk_xxxxxxxxxx..." />
        <br>
        <button class="btn btn-primary" onclick="saveToken()">Conectar</button>
      </div>
    `;
    return;
  }

  // ── Loading screen ──
  if (STATE.loading) {
    app.innerHTML = `
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>Carregando dados do ClickUp...</p>
        <p class="progress">${STATE.progress}</p>
      </div>
    `;
    return;
  }

  // ── Error ──
  if (STATE.error) {
    app.innerHTML = `
      <div class="error">
        <strong>Erro:</strong> ${STATE.error}
        <br><br>
        <button class="btn" onclick="STATE.token=''; localStorage.removeItem('ck_token'); render();">Reconfigurar token</button>
        <button class="btn btn-primary" onclick="loadData()" style="margin-left:8px;">Tentar novamente</button>
      </div>
    `;
    return;
  }

  // ── No data yet ──
  if (STATE.tasks.length === 0) {
    app.innerHTML = `
      <div class="setup-card">
        <h2>📊 Dashboard Lead Time</h2>
        <p>Token configurado. Clique para buscar os dados das tarefas concluídas nas 3 squads.</p>
        <button class="btn btn-primary" onclick="loadData()">🔄 Carregar dados</button>
        <br><br>
        <button class="btn" onclick="STATE.token=''; localStorage.removeItem('ck_token'); render();" style="font-size:11px;">Trocar token</button>
      </div>
    `;
    return;
  }

  // ── Dashboard ──
  const filtered = STATE.filterSquad
    ? STATE.tasks.filter(t => t.squad === STATE.filterSquad)
    : STATE.tasks;

  const valid = filtered.filter(t => t.lt != null && t.lt > 0);
  const globalAvg = avg(filtered.map(t => t.lt));
  const globalMed = med(filtered.map(t => t.lt));
  const globalP90 = p90(filtered.map(t => t.lt));
  const negatives = filtered.filter(t => t.lt != null && t.lt < 0).length;

  const grouped = STATE.view === "squad"
    ? groupBy(valid, "squad").map(g => ({ ...g, name: `Squad ${g.name}` }))
    : STATE.view === "cliente"
      ? groupBy(valid, "cliente")
      : groupBy(valid, "resp");

  const maxVal = grouped.length > 0 ? Math.max(...grouped.map(g => g.avg)) : 1;
  const limit = STATE.view === "squad" ? 3 : 20;

  const sqClass = (s) => s === STATE.filterSquad ? `btn active-${s.toLowerCase()}` : "btn";

  app.innerHTML = `
    <!-- Header -->
    <div class="header">
      <div>
        <h1>Lead Time Médio</h1>
        <p>Tarefas concluídas · ${filtered.length} entregas · atualizado agora</p>
      </div>
      <div class="header-actions">
        <button class="${STATE.filterSquad === null ? 'btn active' : 'btn'}" onclick="setFilter(null)">Todas</button>
        <button class="${sqClass('A')}" onclick="setFilter('A')">Squad A</button>
        <button class="${sqClass('B')}" onclick="setFilter('B')">Squad B</button>
        <button class="${sqClass('C')}" onclick="setFilter('C')">Squad C</button>
        <button class="btn" onclick="loadData()" title="Atualizar dados">🔄</button>
      </div>
    </div>

    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi">
        <div class="kpi-label">Média geral</div>
        <div class="kpi-value">${globalAvg}d</div>
        <div class="kpi-sub">dias por entrega</div>
      </div>
      <div class="kpi kpi-b">
        <div class="kpi-label">Mediana</div>
        <div class="kpi-value">${globalMed}d</div>
        <div class="kpi-sub">valor central</div>
      </div>
      <div class="kpi kpi-c">
        <div class="kpi-label">P90</div>
        <div class="kpi-value">${globalP90}d</div>
        <div class="kpi-sub">90% entregam até</div>
      </div>
      <div class="kpi kpi-d">
        <div class="kpi-label">Total entregas</div>
        <div class="kpi-value">${valid.length}</div>
        <div class="kpi-sub">${negatives > 0 ? negatives + ' com lead time negativo' : 'com lead time válido'}</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab ${STATE.view === 'squad' ? 'active' : ''}" onclick="setView('squad')">◼ Por Squad</button>
      <button class="tab ${STATE.view === 'cliente' ? 'active' : ''}" onclick="setView('cliente')">◆ Por Cliente</button>
      <button class="tab ${STATE.view === 'resp' ? 'active' : ''}" onclick="setView('resp')">● Por Responsável</button>
      <div class="tab-spacer"></div>
      <label class="tab-check">
        <input type="checkbox" ${STATE.showMedian ? 'checked' : ''} onchange="toggleMedian()" />
        Mediana
      </label>
    </div>

    <!-- Chart -->
    <div class="chart-card">
      <div class="chart-title">
        <span>${STATE.view === 'squad' ? 'Média por squad' : STATE.view === 'cliente' ? 'Média por cliente' : 'Média por responsável'} (dias)</span>
        <span style="font-size:11px;color:var(--text-3)">▮ média ${STATE.showMedian ? '· <span style="color:var(--accent)">▮</span> mediana' : ''}</span>
      </div>
      ${grouped.length === 0
        ? '<div style="text-align:center;padding:40px;color:var(--text-3)">Sem dados de lead time disponíveis</div>'
        : grouped.slice(0, limit).map(g => {
          const pct = maxVal > 0 ? (g.avg / maxVal) * 100 : 0;
          const sqCls = g.squad === 'A' ? 'sq-a' : g.squad === 'B' ? 'sq-b' : g.squad === 'C' ? 'sq-c' : 'sq-a';
          const medLine = STATE.showMedian && g.med > 0
            ? `<div class="bar-median" style="left:${Math.min((g.med / maxVal) * 100, 100)}%" title="Mediana: ${g.med}d"></div>`
            : '';
          return `
            <div class="bar-row">
              <div class="bar-label" title="${g.name}">${g.name}</div>
              <div class="bar-track">
                <div class="bar-fill ${sqCls}" style="width:${Math.min(pct, 100)}%"></div>
                ${medLine}
                <span class="bar-value">${g.avg}d</span>
              </div>
              <div class="bar-count">${g.count}</div>
            </div>`;
        }).join('')
      }
    </div>

    <!-- Detail toggle -->
    <div style="margin-top:16px; display:flex; justify-content:space-between; align-items:center;">
      <button class="detail-toggle" onclick="toggleDetail()">
        ${STATE.showDetail ? '▾ Ocultar tabela detalhada' : '▸ Ver tabela detalhada'}
      </button>
      <span style="font-size:11px; color:var(--text-3)">
        ${STATE.tasks.filter(t => t.lt == null).length} tarefas sem lead time (sem start_date)
      </span>
    </div>

    ${STATE.showDetail ? renderDetailTable(valid) : ''}

    <!-- Footer -->
    <div class="footer">
      Lead Time = Data Entrega Oficial − Data Início (dias). Fórmula ClickUp: campo <code>${CONFIG.fieldLeadTime.substring(0, 8)}</code>.
      Dados puxados em tempo real via API REST do ClickUp. ${STATE.showMedian ? 'Linha amarela = mediana.' : ''}
      <br>Token armazenado apenas no localStorage deste navegador.
      <button class="btn" onclick="STATE.token=''; localStorage.removeItem('ck_token'); render();" style="font-size:10px; padding:2px 8px; margin-left:8px;">Desconectar</button>
    </div>
  `;
}

function renderDetailTable(tasks) {
  const sorted = [...tasks].sort((a, b) => (b.lt || 0) - (a.lt || 0));
  const rows = sorted.slice(0, 50).map(t => {
    const badge = t.squad === 'A' ? 'badge-a' : t.squad === 'B' ? 'badge-b' : 'badge-c';
    return `<tr>
      <td>${t.customId || t.id}</td>
      <td title="${t.name}">${t.name.length > 40 ? t.name.substring(0, 40) + '...' : t.name}</td>
      <td><span class="badge ${badge}">Squad ${t.squad}</span></td>
      <td>${t.cliente}</td>
      <td>${t.resp}</td>
      <td style="font-weight:600; ${t.lt > 60 ? 'color:var(--danger)' : ''}">${t.lt}d</td>
      <td>${t.desvio != null ? t.desvio + 'd' : '-'}</td>
    </tr>`;
  }).join('');

  return `
    <table class="detail-table">
      <thead>
        <tr>
          <th>CIOP</th>
          <th>Tarefa</th>
          <th>Squad</th>
          <th>Cliente</th>
          <th>Responsável</th>
          <th>Lead Time</th>
          <th>Desvio</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    ${sorted.length > 50 ? `<div style="text-align:center;padding:8px;font-size:11px;color:var(--text-3)">Mostrando top 50 de ${sorted.length}</div>` : ''}
  `;
}

// ══════════════════════════════════════════════════════════
// EVENT HANDLERS
// ══════════════════════════════════════════════════════════
function saveToken() {
  const val = document.getElementById("tokenInput").value.trim();
  if (!val) return;
  STATE.token = val;
  localStorage.setItem("ck_token", val);
  render();
}

function setView(v) { STATE.view = v; render(); }
function setFilter(s) { STATE.filterSquad = s; render(); }
function toggleMedian() { STATE.showMedian = !STATE.showMedian; render(); }
function toggleDetail() { STATE.showDetail = !STATE.showDetail; render(); }

// ── Init ──
render();
</script>
</body>
</html>
